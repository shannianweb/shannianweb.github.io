<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>支付成功 - 闪念</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #f5f7ff 0%, #eef2ff 45%, #fafafa 100%);
      color: #1a1a1a;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #ecfdf3;
      color: #16a34a;
      font-size: 32px;
      line-height: 64px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      line-height: 1.7;
      color: #52525b;
      margin-bottom: 8px;
    }
    .hint {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f4f4f5;
      font-size: 14px;
      color: #3f3f46;
    }
    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #a1a1aa;
    }
    a {
      color: #4f46e5;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">✓</div>
    <h1>支付成功</h1>
    <p>感谢支持闪念会员。</p>
    <p>请返回闪念 App 或桌面端，会员状态将在几秒内自动生效。</p>
    <div class="hint">
      若未立即显示会员，请在内购页面点击「验证付款」，或重新登录后再查看。
    </div>
    <p class="footer">
      <a href="https://ideasnap.xyz/">返回闪念官网</a>
    </p>
  </main>
</body>
</html>
